name: Lint and Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas matplotlib
        pip install pyflakes

    - name: Static check with pyflakes
      run: |
        pyflakes paper-rmt-zeta/code/ || true   # warnings non bloquants

    - name: Smoke test - import core modules
      run: |
        cd paper-rmt-zeta/code
        python -c "import rmt_zeta; print('rmt_zeta OK')"
        python -c "import ml_models; print('ml_models OK')"

    - name: Smoke test - run paper pipeline
      run: |
        cd paper-rmt-zeta/code
        python 01_build_data.py
        python rmt_zeta.py
        python ml_models.py
